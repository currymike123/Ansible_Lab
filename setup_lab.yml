- name: Setup Lab Accounts and Remove Test Account
  hosts: new_nucs
  become: true

  # Load the encrypted passwords from our vault file.
  vars_files:
    - secrets.yml

  # Define the usernames we'll be working with throughout the playbook.
  vars:
    admin_username: "csadmin"
    student_username: "student"
    deprecated_username: "test"

  tasks:
    - name: Ensure local admin account exists
      # Create our main admin account for the lab.
      # The password hash is pulled from the encrypted secrets.yml file.
      ansible.builtin.user:
        name: "{{ admin_username }}"
        password: "{{ vault_admin_hash }}"
        update_password: on_create
        groups: sudo # Add this user to the sudo group for admin rights.
        shell: /bin/bash
        state: present
        create_home: true

    - name: Grant passwordless sudo to the new admin user
      # This allows us to reconnect as csadmin and use sudo without a password prompt.
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/99-ansible-{{ admin_username }}"
        content: "{{ admin_username }} ALL=(ALL) NOPASSWD: ALL"
        validate: /usr/sbin/visudo -cf %s
        mode: '0440'

    - name: Ensure local student account exists
      # This sets up the generic student account for the lab.
      # The password hash is also pulled from the vault.
      ansible.builtin.user:
        name: "{{ student_username }}"
        password: "{{ vault_student_hash }}"
        update_password: on_create
        # Explicitly set groups to ensure a working interactive login.
        groups: "users,video,audio"
        shell: /bin/bash
        state: present
        # 'append: true' is important here. It makes sure the student user is
        # added to the default groups needed for a proper login session.
        append: true
        create_home: true

    - name: Reset SSH connection to log in as the new admin user
      ansible.builtin.meta:
        reset_connection

    - name: Remove the old Test account and delete its home directory
      # Now that we are connected as csadmin, we can safely delete the test user.
      ansible.builtin.user:
        name: "{{ deprecated_username }}"
        state: absent
        remove: true
        force: true
      # This task will now run with the csadmin user's sudo privileges.
      become: true
      vars:
        ansible_user: "{{ admin_username }}"

    # Last step is to reboot. This makes sure all changes, especially user
    # group memberships and system settings, are fully applied.
    - name: Reboot the machine to apply all changes
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible."